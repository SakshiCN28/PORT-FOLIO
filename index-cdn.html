      // =========================================================
      // 1. NeuralBackground Component
      // =========================================================
      function NeuralBackground() {
        const canvasRef = useRef(null);

        useEffect(() => {
          const canvas = canvasRef.current;
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          if (!ctx) return;

          let animationFrameId;
          let particles = [];
          const maxParticles = 60;
          const connectionDist = 120;
          let mouse = { x: null, y: null, radius: 150 };

          const handleMouseMove = (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
          };

          const handleMouseLeave = () => {
            mouse.x = null;
            mouse.y = null;
          };

          const handleResize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
          };

          window.addEventListener('mousemove', handleMouseMove);
          window.addEventListener('mouseleave', handleMouseLeave);
          window.addEventListener('resize', handleResize);
          
          handleResize();

          class Particle {
            constructor() {
              this.x = Math.random() * canvas.width;
              this.y = Math.random() * canvas.height;
              this.vx = (Math.random() - 0.5) * 0.6;
              this.vy = (Math.random() - 0.5) * 0.6;
              this.size = Math.random() * 2 + 1;
            }

            update() {
              this.x += this.vx;
              this.y += this.vy;

              if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
              if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }

            draw() {
              ctx.fillStyle = 'rgba(139, 92, 246, 0.35)';
              ctx.beginPath();
              ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
              ctx.fill();
            }
          }

          for (let i = 0; i < maxParticles; i++) {
            particles.push(new Particle());
          }

          const animate = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particles.length; i++) {
              particles[i].update();
              particles[i].draw();

              for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < connectionDist) {
                  const alpha = (1 - dist / connectionDist) * 0.12;
                  ctx.strokeStyle = `rgba(6, 182, 212, ${alpha})`;
                  ctx.lineWidth = 0.8;
                  ctx.beginPath();
                  ctx.moveTo(particles[i].x, particles[i].y);
                  ctx.lineTo(particles[j].x, particles[j].y);
                  ctx.stroke();
                }
              }

              if (mouse.x !== null && mouse.y !== null) {
                const dx = particles[i].x - mouse.x;
                const dy = particles[i].y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < mouse.radius) {
                  const alpha = (1 - dist / mouse.radius) * 0.2;
                  ctx.strokeStyle = `rgba(139, 92, 246, ${alpha})`;
                  ctx.lineWidth = 1;
                  ctx.beginPath();
                  ctx.moveTo(particles[i].x, particles[i].y);
                  ctx.lineTo(mouse.x, mouse.y);
                  ctx.stroke();
                }
              }
            }

            animationFrameId = requestAnimationFrame(animate);
          };

          animate();

          return () => {
            cancelAnimationFrame(animationFrameId);
            window.removeEventListener('mousemove', handleMouseMove);
            window.removeEventListener('mouseleave', handleMouseLeave);
            window.removeEventListener('resize', handleResize);
          };
        }, []);

        return (
          <canvas
            ref={canvasRef}
            className="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-60"
          />
        );
      }

      // =========================================================
      // 6. Playground Component
      // =========================================================
      function Playground() {
        const [sentimentText, setSentimentText] = useState('');
        const [sentimentScores, setSentimentScores] = useState({ pos: 0, neu: 100, neg: 0 });
        const [activeSentiment, setActiveSentiment] = useState('neutral');

        const posWords = ['good', 'great', 'awesome', 'excellent', 'amazing', 'love', 'happy', 'cool', 'smart', 'outstanding', 'best', 'science', 'ml', 'ai', 'intelligent', 'beautiful', 'fun', 'react', 'tailwind'];
        const negWords = ['bad', 'fail', 'error', 'sad', 'hate', 'worst', 'poor', 'wrong', 'horrible', 'broken', 'bug', 'hard', 'ugly', 'useless', 'terrible', 'slow', 'legacy'];

        useEffect(() => {
          const text = sentimentText.toLowerCase().trim();
          if (text === '') {
            setSentimentScores({ pos: 0, neu: 100, neg: 0 });
            setActiveSentiment('neutral');
            return;
          }

          const words = text.split(/\W+/);
          let posCount = 0;
          let negCount = 0;

          words.forEach(word => {
            if (posWords.includes(word)) posCount++;
            if (negWords.includes(word)) negCount++;
          });

          const total = posCount + negCount;
          let pScore = 0.2;
          let nScore = 0.1;

          if (total > 0) {
            pScore = posCount / total;
            nScore = negCount / total;
          } else if (text.length > 5) {
            pScore = 0.35;
            nScore = 0.15;
          }

          const rawPos = Math.round(pScore * 100);
          const rawNeg = Math.round(nScore * 100);
          const rawNeu = 100 - rawPos - rawNeg;

          const finalPos = Math.max(0, Math.min(100, rawPos));
          const finalNeg = Math.max(0, Math.min(100, rawNeg));
          const finalNeu = Math.max(0, Math.min(100, rawNeu));

          setSentimentScores({ pos: finalPos, neu: finalNeu, neg: finalNeg });

          if (finalPos > finalNeu && finalPos >= finalNeg) {
            setActiveSentiment('positive');
          } else if (finalNeg > finalNeu && finalNeg >= finalPos) {
            setActiveSentiment('negative');
          } else {
            setActiveSentiment('neutral');
          }
        }, [sentimentText]);

        // Neural Net Simulator State
        const [networkType, setNetworkType] = useState('dnn');
        const [learningRate, setLearningRate] = useState('0.01');
        const [isTraining, setIsTraining] = useState(false);
        const [epoch, setEpoch] = useState(0);
        const [loss, setLoss] = useState('N/A');
        const [accuracy, setAccuracy] = useState('N/A');
        const [statusText, setStatusText] = useState('Idle');

        const chartRef = useRef(null);
        const intervalRef = useRef(null);
        const historyLossRef = useRef([]);
        const historyValLossRef = useRef([]);

        const drawGrid = (ctx, w, h) => {
          ctx.clearRect(0, 0, w, h);
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
          ctx.lineWidth = 1;

          for (let y = 20; y < h; y += 35) {
            ctx.beginPath();
            ctx.moveTo(30, y);
            ctx.lineTo(w - 15, y);
            ctx.stroke();
          }
          for (let x = 30; x < w; x += 45) {
            ctx.beginPath();
            ctx.moveTo(x, 10);
            ctx.lineTo(x, h - 20);
            ctx.stroke();
          }

          ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
          ctx.beginPath();
          ctx.moveTo(30, 10);
          ctx.lineTo(30, h - 20);
          ctx.lineTo(w - 15, h - 20);
          ctx.stroke();

          ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
          ctx.font = '9px monospace';
          ctx.fillText('Loss', 5, 14);
          ctx.fillText('Epochs', w - 40, h - 5);
        };

        const updateChart = () => {
          const canvas = chartRef.current;
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          if (!ctx) return;

          const w = canvas.width;
          const h = canvas.height;
          drawGrid(ctx, w, h);

          const paddingLeft = 30;
          const paddingRight = 15;
          const paddingTop = 10;
          const paddingBottom = 20;

          const plotW = w - paddingLeft - paddingRight;
          const plotH = h - paddingTop - paddingBottom;

          const lossHist = historyLossRef.current;
          const valLossHist = historyValLossRef.current;
          if (lossHist.length === 0) return;

          ctx.strokeStyle = 'hsl(185, 90%, 45%)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          for (let i = 0; i < lossHist.length; i++) {
            const x = paddingLeft + (i / 100) * plotW;
            const y = paddingTop + plotH - (lossHist[i] / 1.0) * plotH;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();

          ctx.strokeStyle = 'hsl(265, 85%, 60%)';
          ctx.lineWidth = 1.5;
          ctx.setLineDash([2, 2]);
          ctx.beginPath();
          for (let i = 0; i < valLossHist.length; i++) {
            const x = paddingLeft + (i / 100) * plotW;
            const y = paddingTop + plotH - (valLossHist[i] / 1.0) * plotH;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
          ctx.setLineDash([]);
        };

        useEffect(() => {
          const canvas = chartRef.current;
          if (canvas) {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight || 180;
            const ctx = canvas.getContext('2d');
            drawGrid(ctx, canvas.width, canvas.height);
          }
        }, []);

        const handleTrainToggle = () => {
          if (isTraining) {
            stopTraining();
          } else {
            startTraining();
          }
        };

        const startTraining = () => {
          setIsTraining(true);
          setStatusText('Training...');
          historyLossRef.current = [];
          historyValLossRef.current = [];
          setEpoch(0);

          const lr = parseFloat(learningRate);
          const stepRate = lr * (networkType === 'cnn' ? 1.4 : networkType === 'dnn' ? 1.0 : 0.75);
          const maxEpochs = 100;
          let curEpoch = 0;

          if (intervalRef.current) clearInterval(intervalRef.current);

          intervalRef.current = setInterval(() => {
            curEpoch++;
            
            const decay = Math.exp(-curEpoch * stepRate * 0.15);
            const computedLoss = 0.8 * decay + 0.05 + (Math.random() * 0.02);
            const computedValLoss = 0.85 * decay + 0.08 + (Math.random() * 0.04);
            let computedAcc = (1 - computedLoss * 0.8) * 100;
            if (computedAcc > 98) computedAcc = 98 + Math.random() * 1.5;

            historyLossRef.current.push(computedLoss);
            historyValLossRef.current.push(computedValLoss);

            setEpoch(curEpoch);
            setLoss(computedLoss.toFixed(4));
            setAccuracy(`${computedAcc.toFixed(1)}%`);
            
            updateChart();

            if (curEpoch >= maxEpochs) {
              clearInterval(intervalRef.current);
              setIsTraining(false);
              setStatusText('Completed');
            }
          }, 45);
        };

        const stopTraining = () => {
          clearInterval(intervalRef.current);
          setIsTraining(false);
          setStatusText('Interrupted');
        };

        useEffect(() => {
          return () => clearInterval(intervalRef.current);
        }, []);

        return (
          <section id="playground" className="py-24 relative">
            <div className="max-w-7xl mx-auto px-6 relative z-10">
              
              <div className="flex flex-col mb-16">

            </div>
          </section>
        );
      }

      // =========================================================

      // =========================================================
      function Testimonials() {
        const testimonials = [
          {
            quote: "Amruta's ability to take complex machine learning datasets and hook them directly into our real-time React analytics dashboard was a game-changer for our collaborative project. Her attention to detail is outstanding.",
            author: "Sarah Jenkins",
            role: "Lead Project Manager, Neural Dynamics Labs"
          },
          {
            quote: "Her PostgreSQL database optimizations reduced our lookup queries bottlenecks by nearly 20%. She is a highly enthusiastic, fast-learning developer who communicates complex mathematical ideas clearly.",

            role: "Senior Data Scientist, Data Analytics Group"

          {

            author: "Elena Rostova",
            role: "Open-Source Coordinator, GitHub ML Devs"
          }
        ];

        return (
          <section id="testimonials" className="py-24 relative">
            <div className="max-w-7xl mx-auto px-6 relative z-10">
              
              <div className="flex flex-col mb-16">
                <h2 className="text-3xl sm:text-4xl font-extrabold text-white mb-4 relative inline-block">
                  Testimonials
                  <span className="absolute bottom-[-8px] left-0 w-16 h-1 bg-gradient-to-r from-primary to-secondary rounded-full" />
                </h2>
                <p className="text-slate-400 text-base sm:text-lg max-w-2xl mt-4">
                  Feedback and recommendations from team leads, supervisors, and development collaborators.
                </p>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                {testimonials.map((test, idx) => (
                  <div
                    key={idx}
                    className="glass-card rounded-2xl p-6 border border-white/5 shadow-md flex flex-col justify-between relative group glass-card-hover"
                  >
                    <IconQuote className="absolute top-6 right-6 w-8 h-8 text-primary/10 group-hover:text-primary/20 transition-colors duration-300" />
                    
                    <div className="relative z-10 flex flex-col justify-between h-full">
                      <p className="text-slate-300 text-sm leading-relaxed mb-8 italic">
                        "{test.quote}"
                      </p>

                      <div className="border-t border-white/5 pt-4">
                        <div className="font-bold text-white text-sm">
                          {test.author}
                        </div>
                        <div className="text-slate-500 text-xs mt-0.5">
                          {test.role}
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>

            </div>
          </section>

      }

      // =========================================================
      // 11. Contact Component
      // =========================================================
      function Contact() {
        const [formData, setFormData] = useState({ name: '', email: '', subject: '', message: '' });
        const [status, setStatus] = useState({ type: '', msg: '' });

        const handleInputChange = (e) => {
          const { name, value } = e.target;
          setFormData((prev) => ({ ...prev, [name]: value }));
        };

        const handleFormSubmit = (e) => {
          e.preventDefault();
          const { name, email, subject, message } = formData;

          if (!name.trim() || !email.trim() || !subject.trim() || !message.trim()) {
            setStatus({ type: 'error', msg: 'All form fields are required.' });
            return;
          }

          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailRegex.test(email.trim())) {
            setStatus({ type: 'error', msg: 'Please provide a valid email format.' });
            return;
          }

          setStatus({ type: 'loading', msg: 'Processing message transmission...' });

          setTimeout(() => {
            setStatus({
              type: 'success',
              msg: 'Connection established! Your message has been sent successfully to Amruta.'
            });
            setFormData({ name: '', email: '', subject: '', message: '' });
          }, 1500);
        };

        return (
          <section id="contact" className="py-24 relative bg-gradient-to-t from-darkBg to-transparent">
            <div className="max-w-7xl mx-auto px-6 relative z-10">
              
              <div className="flex flex-col mb-16">
                <h2 className="text-3xl sm:text-4xl font-extrabold text-white mb-4 relative inline-block">
                  Get In Touch
                  <span className="absolute bottom-[-8px] left-0 w-16 h-1 bg-gradient-to-r from-primary to-secondary rounded-full" />
                </h2>
                <p className="text-slate-400 text-base sm:text-lg max-w-2xl mt-4">
                  Let's discuss training models, processing pipelines, or collaborating on innovative AI solutions.
                </p>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-12 gap-12">
                <div className="lg:col-span-5 flex flex-col justify-between gap-8">
                  <div className="flex flex-col gap-6">
                    
                    <div className="glass-card rounded-2xl p-6 border border-white/5 flex items-center gap-4 hover:border-primary/30 transition-all duration-300">
                      <div className="h-12 w-12 rounded-xl bg-white/5 flex items-center justify-center text-primary">
                        <IconMail className="w-5 h-5" />
                      </div>
                      <div>
                        <h4 className="text-xs uppercase tracking-wider text-slate-500 font-bold mb-1">Email</h4>
                        <a href="mailto:amruta.ml@outlook.com" className="text-white text-sm font-semibold hover:text-primary transition-colors">
                          amruta.ml@outlook.com
                        </a>
                      </div>
                    </div>

                    <div className="glass-card rounded-2xl p-6 border border-white/5 flex items-center gap-4 hover:border-secondary/30 transition-all duration-300">
                      <div className="h-12 w-12 rounded-xl bg-white/5 flex items-center justify-center text-secondary">
                        <IconMapPin className="w-5 h-5" />
                      </div>
                      <div>
                        <h4 className="text-xs uppercase tracking-wider text-slate-500 font-bold mb-1">Location</h4>
                        <p className="text-white text-sm font-semibold">Karnataka, India</p>
                      </div>
                    </div>

                  </div>

                  <div className="glass-card rounded-2xl p-6 border border-white/5">
                    <h4 className="text-sm font-bold text-white mb-4">Connect on Social Media</h4>
                    <div className="flex items-center gap-4">
                      <a
                        href="https://linkedin.com"
                        target="_blank"
                        rel="noopener noreferrer"
                        className="flex items-center justify-center w-10 h-10 rounded-xl bg-white/5 border border-white/10 hover:border-primary hover:text-primary transition-all duration-300 text-slate-400"
                      >
                        <IconLinkedin className="w-5 h-5" />
                      </a>
                      <a
                        href="https://github.com"
                        target="_blank"
                        rel="noopener noreferrer"
                        className="flex items-center justify-center w-10 h-10 rounded-xl bg-white/5 border border-white/10 hover:border-secondary hover:text-secondary transition-all duration-300 text-slate-400"
                      >
                        <IconGithub className="w-5 h-5" />
                      </a>
                      <a
                        href="https://twitter.com"
                        target="_blank"
                        rel="noopener noreferrer"
                        className="flex items-center justify-center w-10 h-10 rounded-xl bg-white/5 border border-white/10 hover:border-accent hover:text-accent transition-all duration-300 text-slate-400"
                      >
                        <IconTwitter className="w-5 h-5" />
                      </a>
                    </div>
                  </div>
                </div>

                <div className="lg:col-span-7">
                  <div className="glass-card rounded-2xl p-8 border border-white/5 relative overflow-hidden">
                    <form onSubmit={handleFormSubmit} className="flex flex-col gap-6" noValidate>
                      {status.msg && (
                        <div className={`p-4 rounded-xl flex items-start gap-3 border text-sm ${status.type === 'error' ? 'bg-rose-500/10 border-rose-500/30 text-rose-400' : status.type === 'success' ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : 'bg-secondary/10 border-secondary/30 text-secondary'}`}>
                          {status.type === 'error' && <IconAlertCircle className="w-5 h-5 shrink-0" />}
                          {status.type === 'success' && <IconCheckCircle className="w-5 h-5 shrink-0" />}
                          {status.type === 'loading' && (
                            <span className="w-5 h-5 border-2 border-secondary/30 border-t-secondary rounded-full animate-spin shrink-0 block" />
                          )}
                          <span>{status.msg}</span>
                        </div>
                      )}

                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div className="flex flex-col gap-1.5">
                          <label htmlFor="name" className="text-slate-400 text-xs font-bold uppercase tracking-wider">Your Name</label>
                          <input
                            type="text"
                            id="name"
                            name="name"
                            value={formData.name}
                            onChange={handleInputChange}
                            placeholder="Alex Mercer"
                            className="bg-black/25 border border-white/10 text-white rounded-xl p-3 text-sm focus:outline-none focus:border-primary transition-colors focus:ring-1 focus:ring-primary/20"
                          />
                        </div>

                        <div className="flex flex-col gap-1.5">
                          <label htmlFor="email" className="text-slate-400 text-xs font-bold uppercase tracking-wider">Email Address</label>
                          <input
                            type="email"
                            id="email"
                            name="email"
                            value={formData.email}
                            onChange={handleInputChange}
                            placeholder="alex@domain.com"
                            className="bg-black/25 border border-white/10 text-white rounded-xl p-3 text-sm focus:outline-none focus:border-primary transition-colors focus:ring-1 focus:ring-primary/20"
                          />
                        </div>
                      </div>

                      <div className="flex flex-col gap-1.5">
                        <label htmlFor="subject" className="text-slate-400 text-xs font-bold uppercase tracking-wider">Subject</label>
                        <input
                          type="text"
                          id="subject"
                          name="subject"
                          value={formData.subject}
                          onChange={handleInputChange}
                          placeholder="Collaboration / Job Opportunity"
                          className="bg-black/25 border border-white/10 text-white rounded-xl p-3 text-sm focus:outline-none focus:border-primary transition-colors focus:ring-1 focus:ring-primary/20"
                        />
                      </div>

                      <div className="flex flex-col gap-1.5">
                        <label htmlFor="message" className="text-slate-400 text-xs font-bold uppercase tracking-wider">Message Details</label>
                        <textarea
                          id="message"
                          name="message"
                          value={formData.message}
                          onChange={handleInputChange}
                          rows={4}
                          placeholder="Hi Amruta, I was impressed by your AI & Data Science portfolio..."
                          className="bg-black/25 border border-white/10 text-white rounded-xl p-3 text-sm focus:outline-none focus:border-primary transition-colors focus:ring-1 focus:ring-primary/20 resize-none"
                        />
                      </div>

                      <button
                        type="submit"
                        disabled={status.type === 'loading'}
                        className="bg-gradient-btn text-white py-3.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 border border-white/10 bg-gradient-btn-hover hover:shadow-lg transition-all duration-300 disabled:opacity-50"
                      >
                        <span>Send Message</span>
                        <IconSend className="w-4 h-4" />
                      </button>
                    </form>
                  </div>
                </div>
              </div>

            </div>
          </section>
        );
      }

      // =========================================================
      // 12. Footer Component
      // =========================================================
      function Footer() {
        const currentYear = new Date().getFullYear();

        return (
          <footer className="bg-darkSurface/90 border-t border-white/5 py-12 relative z-10">
            <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-6">
              
              <a href="#hero" className="flex items-center gap-2 text-lg font-bold text-white">
                <IconBrain className="w-5 h-5 text-secondary" />
                <span>AMRUTA<span className="text-secondary">.AI</span></span>
              </a>

              <p className="text-sm text-slate-500 text-center">
                &copy; {currentYear} Amruta Malipatil. Artificial Intelligence & Data Science Developer. All rights reserved.
              </p>

              <div className="flex items-center gap-4">
                <a
                  href="https://linkedin.com"
                  target="_blank"
                  rel="noopener noreferrer"
                  className="w-9 h-9 flex items-center justify-center rounded-lg border border-white/10 text-slate-400 hover:text-white hover:border-primary hover:bg-primary/5 transition-all duration-300"
                  aria-label="LinkedIn"
                >
                  <IconLinkedin className="w-4 h-4" />
                </a>
                <a
                  href="https://github.com"
                  target="_blank"
                  rel="noopener noreferrer"
                  className="w-9 h-9 flex items-center justify-center rounded-lg border border-white/10 text-slate-400 hover:text-white hover:border-secondary hover:bg-secondary/5 transition-all duration-300"
                  aria-label="GitHub"
                >
                  <IconGithub className="w-4 h-4" />
                </a>
                <a
                  href="https://twitter.com"
                  target="_blank"
                  rel="noopener noreferrer"
                  className="w-9 h-9 flex items-center justify-center rounded-lg border border-white/10 text-slate-400 hover:text-white hover:border-accent hover:bg-accent/5 transition-all duration-300"
                  aria-label="Twitter"
                >
                  <IconTwitter className="w-4 h-4" />
                </a>
              </div>
            </div>
          </footer>
        );
      }

      // =========================================================
      // 13. App Main Shell Component
      // =========================================================
      function App() {
        return (
          <div className="relative min-h-screen text-slate-100 overflow-x-hidden">
            <NeuralBackground />
            <Navbar />
            <main className="max-w-7xl mx-auto px-6">
              <Hero />
              <About />
              <Skills />
              <Playground />
              <Projects />
              <Experience />
              <Education />
              <Testimonials />
              <Contact />
            </main>
            <Footer />
          </div>
        );
      }

      // Bootstrap React Application
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
